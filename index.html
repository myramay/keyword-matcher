<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Keyword Matcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e2e8f0;
      --muted: #7c85a8;
      --green: #22c55e;
      --green-bg: #052e16;
      --green-border: #166534;
      --red: #f87171;
      --red-bg: #2d0707;
      --red-border: #7f1d1d;
      --accent: #6366f1;
      --accent2: #818cf8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 700px) {
      .inputs { grid-template-columns: 1fr; }
    }

    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .input-card label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .input-card label svg { opacity: 0.7; }

    textarea {
      width: 100%;
      height: 220px;
      padding: 0.85rem 1rem;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.875rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    textarea::placeholder { color: var(--muted); opacity: 0.6; }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      padding: 0.65rem 1.5rem;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #analyzeBtn {
      background: var(--accent);
      color: #fff;
      padding: 0.7rem 2rem;
    }

    #analyzeBtn:hover { opacity: 0.88; }

    #clearBtn {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #clearBtn:hover { color: var(--text); }

    /* Score bar */
    #results { display: none; }

    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .score-ring {
      position: relative;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }

    .score-ring svg { transform: rotate(-90deg); }

    .score-ring .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
    .score-ring .ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }

    .score-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .score-info { flex: 1; min-width: 160px; }

    .score-info h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .score-info .sub { color: var(--muted); font-size: 0.85rem; }

    .score-bar-wrap {
      flex: 2;
      min-width: 200px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .bar-track {
      background: var(--surface2);
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* Keyword grids */
    .kw-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 700px) {
      .kw-section { grid-template-columns: 1fr; }
      .score-card { gap: 1rem; }
    }

    .kw-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .kw-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .kw-card-header .title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .kw-card-header .count {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: 99px;
    }

    .matched-header .title { color: var(--green); }
    .matched-header .count { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .missing-header .title { color: var(--red); }
    .missing-header .count { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .kw-list {
      padding: 0.85rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      min-height: 60px;
    }

    .kw-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.25rem 0.65rem;
      border-radius: 99px;
      border: 1px solid;
    }

    .kw-pill.matched {
      background: var(--green-bg);
      color: var(--green);
      border-color: var(--green-border);
    }

    .kw-pill.missing {
      background: var(--red-bg);
      color: var(--red);
      border-color: var(--red-border);
    }

    .kw-pill .weight {
      font-size: 0.68rem;
      opacity: 0.6;
      font-weight: 400;
    }

    .empty-note {
      color: var(--muted);
      font-size: 0.85rem;
      font-style: italic;
      padding: 0.25rem 0;
    }

    /* Top terms table */
    .terms-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .terms-card-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .terms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0;
    }

    .term-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 0.83rem;
      transition: background 0.1s;
    }

    .term-row:hover { background: var(--surface2); }

    .term-row .term-word { font-weight: 500; }
    .term-row .term-score-bar { display: flex; align-items: center; gap: 0.5rem; }

    .mini-bar {
      width: 50px;
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .mini-bar-fill {
      height: 100%;
      border-radius: 99px;
    }

    .term-row .tval {
      font-size: 0.72rem;
      color: var(--muted);
      width: 2.5rem;
      text-align: right;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Resume Keyword Matcher</h1>
    <p>Paste a job description and your resume — see how well your keywords align.</p>
  </header>

  <div class="inputs">
    <div class="input-card">
      <label>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Job Description
      </label>
      <textarea id="jobDesc" placeholder="Paste the job posting here…"></textarea>
    </div>
    <div class="input-card">
      <label>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Your Resume
      </label>
      <textarea id="resumeText" placeholder="Paste your resume text here…"></textarea>
    </div>
  </div>

  <div class="actions">
    <button id="analyzeBtn" onclick="analyze()">Analyze Match</button>
    <button id="clearBtn" onclick="clearAll()">Clear</button>
  </div>

  <div id="results">
    <div class="score-card">
      <div class="score-ring">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle class="ring-bg" cx="45" cy="45" r="37"/>
          <circle class="ring-fill" id="ringFill" cx="45" cy="45" r="37"/>
        </svg>
        <div class="score-num" id="scoreNum">0%</div>
      </div>
      <div class="score-info">
        <h2 id="scoreLabel">—</h2>
        <div class="sub" id="scoreSub"></div>
      </div>
      <div class="score-bar-wrap">
        <div class="bar-label">
          <span>Keyword Coverage</span>
          <span id="barPct">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="kw-section">
      <div class="kw-card">
        <div class="kw-card-header matched-header">
          <div class="title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Matched Keywords
          </div>
          <span class="count" id="matchedCount">0</span>
        </div>
        <div class="kw-list" id="matchedList"></div>
      </div>
      <div class="kw-card">
        <div class="kw-card-header missing-header">
          <div class="title">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Missing Keywords
          </div>
          <span class="count" id="missingCount">0</span>
        </div>
        <div class="kw-list" id="missingList"></div>
      </div>
    </div>

    <div class="terms-card">
      <div class="terms-card-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Top Keywords by TF-IDF Weight (from Job Description)
      </div>
      <div class="terms-grid" id="termsGrid"></div>
    </div>
  </div>

  <footer>Fully client-side &mdash; nothing leaves your browser.</footer>
</div>

<script>
// ── Stopwords ──────────────────────────────────────────────────────────────
const STOPWORDS = new Set([
  'a','about','above','after','again','against','all','am','an','and','any','are',
  'as','at','be','because','been','before','being','below','between','both','but',
  'by','can','did','do','does','doing','down','during','each','few','for','from',
  'further','get','got','had','has','have','having','he','her','here','hers',
  'herself','him','himself','his','how','i','if','in','into','is','it','its',
  'itself','just','me','more','most','my','myself','no','nor','not','now','of',
  'off','on','once','only','or','other','our','ours','ourselves','out','over',
  'own','re','s','same','she','should','so','some','such','t','than','that','the',
  'their','theirs','them','themselves','then','there','these','they','this',
  'those','through','to','too','under','until','up','us','very','was','we',
  'were','what','when','where','which','while','who','whom','why','will','with',
  'would','you','your','yours','yourself','yourselves','also','may','use','using',
  'used','well','new','work','working','team','role','position','experience',
  'will','including','help','strong','ability','skills','knowledge','must',
  'preferred','required','plus','etc','within','across','via','per','able',
  'good','great','make','set','high','large','small','based','part','need',
  'ensure','provide','support','develop','take','build','join','seeking',
  'responsible','opportunity','looking','ideal','candidate','candidates',
  'apply','applications','following','related','requires','requires','various',
  'day','days','year','years','time','times','type','types','level','levels',
  'key','areas','area','field','multiple','minimum','least','least','least'
]);

// ── Tokenizer ──────────────────────────────────────────────────────────────
function tokenize(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9\s\-\/\+#\.]/g, ' ')   // keep tech chars like C++, .NET
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')
    .map(t => t.replace(/^[\-\.]+|[\-\.]+$/g, ''))  // trim leading/trailing - .
    .filter(t => t.length > 1);
}

// ── Term Frequency ─────────────────────────────────────────────────────────
function termFreq(tokens) {
  const freq = {};
  for (const t of tokens) freq[t] = (freq[t] || 0) + 1;
  return freq;
}

// ── IDF-like weight: penalize stopwords, boost longer / technical terms ────
function idfWeight(term) {
  if (STOPWORDS.has(term)) return 0;
  const len = term.length;
  // Boost: longer words, tech symbols, compound words
  let boost = 1;
  if (len >= 6) boost += 0.4;
  if (len >= 9) boost += 0.4;
  if (/[+#\.]/.test(term)) boost += 0.5;   // C++, .NET, Node.js
  if (/-/.test(term)) boost += 0.3;         // compound terms
  if (/\d/.test(term)) boost += 0.2;        // versioned: python3, es6
  return boost;
}

// ── Extract bigrams ────────────────────────────────────────────────────────
function bigrams(tokens) {
  const bg = [];
  for (let i = 0; i < tokens.length - 1; i++) {
    const a = tokens[i], b = tokens[i + 1];
    if (!STOPWORDS.has(a) && !STOPWORDS.has(b) && a.length > 2 && b.length > 2) {
      bg.push(a + ' ' + b);
    }
  }
  return bg;
}

// ── Score all terms ────────────────────────────────────────────────────────
function scoreTerms(text) {
  const tokens = tokenize(text);
  const freq = termFreq(tokens);
  const total = tokens.length || 1;

  // Unigrams
  const scores = {};
  for (const [term, count] of Object.entries(freq)) {
    const tf = count / total;
    const idf = idfWeight(term);
    if (idf > 0) scores[term] = tf * idf * Math.log(1 + count);
  }

  // Bigrams — extra weight for recurring phrases
  const bgTokens = bigrams(tokens);
  const bgFreq = termFreq(bgTokens);
  for (const [phrase, count] of Object.entries(bgFreq)) {
    if (count >= 1) {
      const tf = count / (total - 1 || 1);
      scores[phrase] = (tf * 1.8 * Math.log(1 + count * 2));
    }
  }

  return scores;
}

// ── Normalize scores to 0-100 ──────────────────────────────────────────────
function normalize(scores) {
  const vals = Object.values(scores);
  if (!vals.length) return {};
  const max = Math.max(...vals);
  const out = {};
  for (const [k, v] of Object.entries(scores)) out[k] = Math.round((v / max) * 100);
  return out;
}

// ── Check if resume contains a keyword (flexible) ─────────────────────────
function resumeHas(resumeTokenSet, resumeText, kw) {
  if (kw.includes(' ')) {
    // bigram: check phrase in raw text
    return resumeText.toLowerCase().includes(kw.toLowerCase());
  }
  // unigram: exact token or starts-with (basic stemming)
  if (resumeTokenSet.has(kw)) return true;
  // check if any resume token starts with the keyword root (len >= 5)
  if (kw.length >= 5) {
    const root = kw.slice(0, Math.max(4, kw.length - 2));
    for (const t of resumeTokenSet) {
      if (t.startsWith(root) && Math.abs(t.length - kw.length) <= 3) return true;
    }
  }
  return false;
}

// ── Main analysis ──────────────────────────────────────────────────────────
function analyze() {
  const jobDesc = document.getElementById('jobDesc').value.trim();
  const resumeText = document.getElementById('resumeText').value.trim();

  if (!jobDesc || !resumeText) {
    alert('Please paste both a job description and your resume.');
    return;
  }

  const rawScores = scoreTerms(jobDesc);
  const normScores = normalize(rawScores);

  // Keep top 40 keywords by score
  const topKws = Object.entries(normScores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 40);

  const resumeTokens = new Set(tokenize(resumeText));

  const matched = [];
  const missing = [];

  for (const [kw, score] of topKws) {
    if (resumeHas(resumeTokens, resumeText, kw)) {
      matched.push({ kw, score });
    } else {
      missing.push({ kw, score });
    }
  }

  // Weighted score: sum of matched scores / sum of all scores
  const totalWeight = topKws.reduce((s, [, v]) => s + v, 0) || 1;
  const matchedWeight = matched.reduce((s, { score }) => s + score, 0);
  const pct = Math.round((matchedWeight / totalWeight) * 100);

  renderResults(pct, matched, missing, topKws);
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderResults(pct, matched, missing, allKws) {
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Score ring
  const circ = 2 * Math.PI * 37;  // r=37
  const fill = document.getElementById('ringFill');
  fill.style.strokeDasharray = circ;
  fill.style.strokeDashoffset = circ - (circ * pct / 100);
  const color = pct >= 70 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#f87171';
  fill.style.stroke = color;

  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('scoreNum').style.color = color;

  const label = pct >= 80 ? 'Excellent Match' : pct >= 60 ? 'Good Match' : pct >= 40 ? 'Moderate Match' : 'Weak Match';
  document.getElementById('scoreLabel').textContent = label;
  document.getElementById('scoreSub').textContent =
    matched.length + ' of ' + (matched.length + missing.length) + ' top keywords found in your resume';

  document.getElementById('barFill').style.width = pct + '%';
  document.getElementById('barFill').style.background = color;
  document.getElementById('barPct').textContent = pct + '%';

  // Keyword lists
  renderPills('matchedList', matched, 'matched');
  renderPills('missingList', missing, 'missing');
  document.getElementById('matchedCount').textContent = matched.length;
  document.getElementById('missingCount').textContent = missing.length;

  // Terms grid
  const grid = document.getElementById('termsGrid');
  grid.innerHTML = '';
  const maxScore = allKws[0]?.[1] || 1;
  for (const [kw, score] of allKws) {
    const isMatched = matched.some(m => m.kw === kw);
    const bar = Math.round((score / maxScore) * 100);
    const barColor = isMatched ? '#22c55e' : '#f87171';
    const row = document.createElement('div');
    row.className = 'term-row';
    row.innerHTML = `
      <span class="term-word" style="color:${isMatched ? '#22c55e' : '#f87171'}">${escHtml(kw)}</span>
      <div class="term-score-bar">
        <div class="mini-bar"><div class="mini-bar-fill" style="width:${bar}%;background:${barColor}"></div></div>
        <span class="tval">${score}</span>
      </div>`;
    grid.appendChild(row);
  }
}

function renderPills(containerId, items, cls) {
  const el = document.getElementById(containerId);
  if (!items.length) {
    el.innerHTML = '<span class="empty-note">None</span>';
    return;
  }
  el.innerHTML = items.map(({ kw, score }) =>
    `<span class="kw-pill ${cls}">${escHtml(kw)}<span class="weight">${score}</span></span>`
  ).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearAll() {
  document.getElementById('jobDesc').value = '';
  document.getElementById('resumeText').value = '';
  document.getElementById('results').style.display = 'none';
}

// Allow Ctrl+Enter to trigger analysis
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>
</body>
</html>
